<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Creator Agent Platform — Architecture Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0b0d; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  svg { display: block; }

  .node rect { rx: 10; ry: 10; }
  .node text { font-size: 13px; font-weight: 600; fill: #fff; text-anchor: middle; dominant-baseline: middle; }
  .node .sub { font-size: 11px; font-weight: 400; fill: rgba(255,255,255,0.6); }

  .edge { fill: none; stroke-width: 1.5; marker-end: url(#arrow); }
  .edge-label { font-size: 11px; fill: #5b616e; text-anchor: middle; }

  .group rect { rx: 16; ry: 16; fill: none; stroke-dasharray: 4,3; stroke-width: 1; }
  .group-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; }
</style>
</head>
<body>
<svg viewBox="0 0 1100 700" width="100%" height="100vh" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">

    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">

    <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">

    </marker>
  </defs>

  <!-- ─── GROUP: 입력 ─── -->
  <g class="group">
    <rect x="20" y="290" width="120" height="120" stroke="#5b616e" opacity="0.3"/>
    <text class="group-label" x="80" y="278" fill="#5b616e">INPUT</text>

    <text class="sub" y="10">Gmail</text>

  <!-- ─── GROUP: GAME + ACP Orchestrator ─── -->

  </g>

  <!-- Node: GameAgent -->
  <g class="node" transform="translate(340,350)">
    <rect x="-80" y="-32" width="160" height="64" fill="#0052ff" stroke="#578bfa" stroke-width="1.5"/>

    <text class="sub" y="10">Orchestrator</text>

  <!-- ─── GROUP: ClassifierWorker ─── -->

  </g>

  <!-- Node: classify_fan_email -->
  <g class="node" transform="translate(580,165)">

  <!-- ─── GROUP: ReplyWorker ─── -->

  <!-- Node: generate_fan_reply -->

  <!-- ─── GROUP: 외부 서비스 ─── -->
  <g class="group">
    <rect x="760" y="90" width="160" height="580" stroke="#5b616e" opacity="0.2"/>
    <text class="group-label" x="840" y="80" fill="#5b616e" text-anchor="middle">EXTERNAL</text>
  </g>

  <!-- Node: Flock.io -->
  <g class="node" transform="translate(840,170)">
    <rect x="-60" y="-28" width="120" height="56" fill="#1a1f35" stroke="#578bfa" stroke-width="1"/>
    <text y="-8">Flock.io</text>
    <text class="sub" y="10">Web3 LLM</text>
  </g>

  <!-- Node: Nansen -->
  <g class="node" transform="translate(840,310)">
    <rect x="-60" y="-28" width="120" height="56" fill="#1a1200" stroke="#f59e0b" stroke-width="1.5"/>
    <text y="-8">Nansen</text>
    <text class="sub" y="10">VIP 팬 조회</text>
  </g>

  <!-- Node: Base Sepolia -->
  <g class="node" transform="translate(840,400)">
    <rect x="-60" y="-28" width="120" height="56" fill="#0a1628" stroke="#0052ff" stroke-width="1"/>
    <text y="-8">Base Sepolia</text>
    <text class="sub" y="10">ERC-721</text>
  </g>

  <!-- Node: x402 -->
  <g class="node" transform="translate(840,530)">
    <rect x="-60" y="-28" width="120" height="56" fill="#141518" stroke="#5b616e" stroke-width="1"/>
    <text y="-8">x402</text>
    <text class="sub" y="10">USDC 자율 결제</text>
  </g>

  <!-- ─── OUTPUT ─── -->
  <g class="group">
    <rect x="960" y="270" width="120" height="160" stroke="#5b616e" opacity="0.3"/>
    <text class="group-label" x="1020" y="258" fill="#5b616e" text-anchor="middle">OUTPUT</text>
  </g>

  <!-- Node: 답장 이메일 -->
  <g class="node" transform="translate(1020,320)">
    <rect x="-50" y="-24" width="100" height="48" fill="#282b31" stroke="#5b616e" stroke-width="1"/>
    <text y="-6">답장 이메일</text>
    <text class="sub" y="10">+ 클레임 링크</text>
  </g>

  <!-- Node: Reply NFT -->
  <g class="node" transform="translate(1020,400)">
    <rect x="-50" y="-24" width="100" height="48" fill="#0a1628" stroke="#0052ff" stroke-width="1"/>
    <text y="-6">Reply NFT</text>
    <text class="sub" y="10">온체인 기록</text>
  </g>

  <!-- ═══════════════════ EDGES ═══════════════════ -->

  <!-- 팬 이메일 → GameAgent -->
  <path id="e-input" class="edge" d="M 130,350 L 260,350" stroke="#5b616e" marker-end="url(#arrow)"/>
  <text class="edge-label" x="195" y="340">이메일</text>

  <!-- GameAgent → ClassifierWorker -->
  <path id="e-classify" class="edge" d="M 390,318 Q 430,240 480,200 L 498,180" stroke="#578bfa" marker-end="url(#arrow-blue)"/>
  <text class="edge-label" x="435" y="255">classify</text>

  <!-- GameAgent → ReplyWorker -->
  <path id="e-reply" class="edge" d="M 420,350 L 498,350" stroke="#0667d0" marker-end="url(#arrow)"/>
  <text class="edge-label" x="460" y="342">reply</text>

  <!-- GameAgent → NFTWorker (emotional_tone) -->
  <path id="e-nft-flow" class="edge" d="M 390,382 Q 430,460 480,510 L 498,510" stroke="#22c55e" marker-end="url(#arrow-green)"/>
  <text class="edge-label" x="432" y="475">emotional_tone</text>

  <!-- ClassifierWorker → Flock.io -->
  <path id="e-flock-classify" class="edge" d="M 660,165 Q 720,165 760,165 L 778,165" stroke="#578bfa" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
  <text class="edge-label" x="720" y="157">LLM 분류</text>

  <!-- Plan (감정분석) → Flock.io -->
  <path id="e-flock-plan" class="edge" d="M 660,330 Q 720,280 760,210 L 778,185" stroke="#0667d0" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- generate_fan_reply → Flock.io -->
  <path id="e-flock-gen" class="edge" d="M 660,400 Q 730,340 760,220 L 778,190" stroke="#0667d0" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text class="edge-label" x="726" y="300">LLM 생성</text>

  <!-- GameAgent → Nansen (VIP 팬 지갑 조회) -->
  <path id="e-nansen" class="edge" d="M 420,335 Q 590,270 778,300" stroke="#f59e0b" stroke-dasharray="4,3" marker-end="url(#arrow-gold)"/>
  <text class="edge-label" x="600" y="278" fill="#f59e0b">VIP 팬 조회</text>

  <!-- Nansen → NFTWorker (VIP 티어 오버라이드) -->
  <path id="e-nansen-tier" class="edge" d="M 778,325 Q 720,410 660,510" stroke="#f59e0b" stroke-dasharray="4,3" marker-end="url(#arrow-gold)"/>
  <text class="edge-label" x="695" y="430" fill="#f59e0b">VIP 오버라이드</text>

  <!-- Plan → generate (내부 흐름) -->
  <path id="e-plan-gen" class="edge" d="M 580,354 L 580,374" stroke="#0667d0" marker-end="url(#arrow)"/>
  <text class="edge-label" x="620" y="367">emotional_tone</text>

  <!-- getTierFromEmotion → mint_reply_nft (내부 흐름) -->
  <path id="e-tier-mint" class="edge" d="M 580,544 L 580,554" stroke="#22c55e" marker-end="url(#arrow-green)"/>
  <text class="edge-label" x="630" y="552">tier</text>

  <!-- mint_reply_nft → Base Sepolia -->
  <path id="e-mint-base" class="edge" d="M 660,580 Q 720,520 760,430 L 778,415" stroke="#22c55e" marker-end="url(#arrow-green)"/>
  <text class="edge-label" x="723" y="503">NFT 민팅</text>

  <!-- mint_reply_nft → x402 -->
  <path id="e-mint-x402" class="edge" d="M 660,580 Q 710,555 760,545 L 778,540" stroke="#5b616e" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text class="edge-label" x="714" y="571">USDC 결제</text>

  <!-- generate_fan_reply → 답장 이메일 -->
  <path id="e-gen-email" class="edge" d="M 660,400 Q 820,370 960,330 L 968,322" stroke="#5b616e" marker-end="url(#arrow)"/>
  <text class="edge-label" x="815" y="352">이메일 발송</text>

  <!-- Base Sepolia → Reply NFT -->
  <path id="e-base-nft" class="edge" d="M 900,400 L 968,400" stroke="#0052ff" marker-end="url(#arrow-blue)"/>
  <text class="edge-label" x="935" y="392">온체인</text>

  <!-- Reply NFT → 답장 이메일 (클레임 링크) -->
  <path id="e-nft-email" class="edge" d="M 1020,374 L 1020,344" stroke="#0052ff" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
  <text class="edge-label" x="1058" y="361">클레임 URL</text>

  <!-- ═══ 범례 ═══ -->
  <g transform="translate(30, 560)">
    <text font-size="12" fill="#5b616e" font-weight="700">범례</text>
    <line x1="0" y1="20" x2="30" y2="20" stroke="#578bfa" stroke-width="1.5"/>
    <text font-size="11" fill="#5b616e" x="35" y="24">GAME Worker 호출</text>
    <line x1="0" y1="40" x2="30" y2="40" stroke="#22c55e" stroke-width="1.5"/>
    <text font-size="11" fill="#5b616e" x="35" y="44">감정 → NFT 티어</text>
    <line x1="0" y1="60" x2="30" y2="60" stroke="#5b616e" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text font-size="11" fill="#5b616e" x="35" y="64">외부 API 호출</text>
    <line x1="0" y1="80" x2="30" y2="80" stroke="#0052ff" stroke-width="1.5"/>
    <text font-size="11" fill="#5b616e" x="35" y="84">온체인 트랜잭션</text>
    <line x1="0" y1="100" x2="30" y2="100" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text font-size="11" fill="#5b616e" x="35" y="104">Nansen VIP 조회</text>
  </g>
</svg>
<script>
  // 순차 화살표 드로잉 애니메이션
  // delay: 각 엣지가 나타나는 시점 (ms)
  const SEQUENCE = [
    { id: 'e-input',          delay: 0    },
    { id: 'e-classify',       delay: 500  },
    { id: 'e-reply',          delay: 500  },
    { id: 'e-nft-flow',       delay: 500  },
    { id: 'e-nansen',         delay: 500  },
    { id: 'e-flock-classify', delay: 1000 },
    { id: 'e-flock-plan',     delay: 1000 },
    { id: 'e-plan-gen',       delay: 1000 },
    { id: 'e-nansen-tier',    delay: 1200 },
    { id: 'e-flock-gen',      delay: 1300 },
    { id: 'e-tier-mint',      delay: 1800 },
    { id: 'e-mint-base',      delay: 2300 },
    { id: 'e-mint-x402',      delay: 2300 },
    { id: 'e-gen-email',      delay: 2300 },
    { id: 'e-base-nft',       delay: 2800 },
    { id: 'e-nft-email',      delay: 3300 },
  ];

  function animatePath(id, delay) {
    const path = document.getElementById(id);
    if (!path) return;
    const len = path.getTotalLength();
    path.style.strokeDasharray = len;
    path.style.strokeDashoffset = len;
    path.style.opacity = '0';
    setTimeout(() => {
      path.style.opacity = '1';
      path.style.transition = 'stroke-dashoffset 0.7s cubic-bezier(0.4, 0, 0.2, 1)';
      path.style.strokeDashoffset = '0';
    }, delay);
  }

  function resetPaths() {
    SEQUENCE.forEach(({ id }) => {
      const path = document.getElementById(id);
      if (!path) return;
      path.style.transition = 'none';
      path.style.opacity = '0';
      path.style.strokeDashoffset = path.getTotalLength();
    });
  }

  // 마지막 애니메이션 완료 후 재시작까지 대기 시간 (ms)
  const LOOP_PAUSE = 1200;
  const TOTAL_ANIM = 3300 + 700; // 마지막 delay + 드로잉 duration
  let loopTimer = null;

  function startAnimation() {
    clearTimeout(loopTimer);
    resetPaths();
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        SEQUENCE.forEach(({ id, delay }) => animatePath(id, delay));
        loopTimer = setTimeout(startAnimation, TOTAL_ANIM + LOOP_PAUSE);
      });
    });
  }

  function stopAnimation() {
    clearTimeout(loopTimer);
    loopTimer = null;
  }

  // 페이지 로드 시 자동 실행
  window.addEventListener('load', startAnimation);

  // 피치덱 iframe postMessage 수신
  window.addEventListener('message', (e) => {
    if (e.data === 'startAnimation') startAnimation();
    if (e.data === 'stopAnimation') stopAnimation();
  });
</script>
</body>
</html>
